<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数字生成器</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 36px;
        }

        /* ---- 结果显示 ---- */
        .result-area {
            background: var(--bg);
            border-radius: 14px;
            padding: 32px 20px;
            text-align: center;
            margin-bottom: 28px;
            border: 2px dashed var(--border);
            transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .result-area.active {
            border-color: var(--accent);
            box-shadow: 0 0 28px rgba(99, 102, 241, 0.15);
        }

        .result-number {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--accent);
            word-break: break-all;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-number.placeholder {
            font-size: 1.125rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            background: var(--border);
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            opacity: 0;
            pointer-events: none;
        }

        .result-area.active .copy-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .copy-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .copy-btn.copied {
            background: var(--success);
            color: #fff;
        }

        /* ---- 设置 ---- */
        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .setting-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .setting-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .setting-group input::-webkit-outer-spin-button,
        .setting-group input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .setting-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* ---- 按钮 ---- */
        .generate-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.01em;
            margin-bottom: 20px;
        }

        .generate-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .generate-btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* ---- 历史 ---- */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .history-header button {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0.6;
            transition: opacity 0.15s;
        }

        .history-header button:hover {
            opacity: 1;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 32px;
        }

        .history-item {
            background: var(--bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.15s;
            animation: fadeIn 0.3s ease;
        }

        .history-item:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        .empty-history {
            color: var(--text-muted);
            font-size: 0.8rem;
            width: 100%;
            text-align: center;
            padding: 6px 0;
        }

        /* ---- 快捷键提示 ---- */
        .shortcut-hint {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-top: 16px;
            opacity: 0.5;
        }

        .shortcut-hint kbd {
            background: var(--border);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 随机数字生成器</h1>
        <p class="subtitle">设置范围，点击生成</p>

        <!-- 结果 -->
        <div class="result-area" id="resultArea">
            <button class="copy-btn" id="copyBtn" title="复制">复制</button>
            <div class="result-number placeholder" id="resultDisplay">—</div>
        </div>

        <!-- 设置 -->
        <div class="settings">
            <div class="setting-group">
                <label for="minInput">最小值</label>
                <input type="number" id="minInput" value="1" step="1">
            </div>
            <div class="setting-group">
                <label for="maxInput">最大值</label>
                <input type="number" id="maxInput" value="100" step="1">
            </div>
        </div>

        <!-- 按钮 -->
        <button class="generate-btn" id="generateBtn">🎯 生成随机数</button>

        <!-- 历史记录 -->
        <div class="history-header">
            <h3>📋 历史记录</h3>
            <button id="clearHistoryBtn">清空</button>
        </div>
        <div class="history-list" id="historyList">
            <span class="empty-history">暂无记录</span>
        </div>

        <p class="shortcut-hint">按 <kbd>Enter</kbd> 或 <kbd>Space</kbd> 快速生成</p>
    </div>

    <script>
        const resultArea = document.getElementById('resultArea');
        const resultDisplay = document.getElementById('resultDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const generateBtn = document.getElementById('generateBtn');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let history = [];
        let lastResult = null;

        // ---- 生成随机数 ----
        function generate() {
            let min = parseInt(minInput.value, 10);
            let max = parseInt(maxInput.value, 10);

            // 处理无效输入
            if (isNaN(min)) min = 0;
            if (isNaN(max)) max = 100;

            // 确保 min <= max
            if (min > max) [min, max] = [max, min];
            minInput.value = min;
            maxInput.value = max;

            // 生成
            const result = Math.floor(Math.random() * (max - min + 1)) + min;
            lastResult = result;

            // 显示
            resultDisplay.textContent = result.toLocaleString();
            resultDisplay.classList.remove('placeholder');
            resultArea.classList.add('active');

            // 动画
            resultDisplay.style.transform = 'scale(1.15)';
            setTimeout(() => { resultDisplay.style.transform = 'scale(1)'; }, 150);

            // 加入历史
            addToHistory(result);
        }

        // ---- 历史记录 ----
        function addToHistory(num) {
            history.unshift(num);
            if (history.length > 12) history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<span class="empty-history">暂无记录</span>';
                return;
            }
            historyList.innerHTML = history
                .map((n, i) =>
                    `<span class="history-item" data-index="${i}" title="点击重新生成此数">${n.toLocaleString()}</span>`
                )
                .join('');
        }

        historyList.addEventListener('click', (e) => {
            const item = e.target.closest('.history-item');
            if (!item) return;
            const num = history[parseInt(item.dataset.index, 10)];
            lastResult = num;
            resultDisplay.textContent = num.toLocaleString();
            resultDisplay.classList.remove('placeholder');
            resultArea.classList.add('active');
        });

        clearHistoryBtn.addEventListener('click', () => {
            history = [];
            renderHistory();
        });

        // ---- 复制 ----
        copyBtn.addEventListener('click', async () => {
            if (lastResult === null) return;
            try {
                await navigator.clipboard.writeText(String(lastResult));
                copyBtn.textContent = '✓ 已复制';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制';
                    copyBtn.classList.remove('copied');
                }, 1800);
            } catch {
                copyBtn.textContent = '失败';
                setTimeout(() => { copyBtn.textContent = '复制'; }, 1500);
            }
        });

        // ---- 事件绑定 ----
        generateBtn.addEventListener('click', generate);

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // 不在输入框中时响应快捷键
            if (document.activeElement === minInput || document.activeElement === maxInput) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    generate();
                }
                return;
            }
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                generate();
            }
        });

        // ---- 初始状态 ----
        resultDisplay.style.transition = 'transform 0.15s ease';
    </script>
</body>
</html>
